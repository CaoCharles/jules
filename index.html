<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科技感靜態網頁</title>
    <link rel="stylesheet" href="style.css">
    <!-- 可以在這裡添加 Favicon 等 -->
</head>
<body>
    <!-- Header Section -->
    <header>
        <nav>
            <div class="logo">TechSite</div>
            <ul>
                <li><a href="#home">首頁</a></li>
                <li><a href="#features">功能</a></li>
                <li><a href="#about">關於</a></li>
                <li><a href="#contact">聯繫</a></li>
            </ul>
        </nav>
    </header>

    <!-- Main Content -->
    <main>
        <!-- Hero Section -->
        <section id="home" class="hero">
            <h1>歡迎來到未來科技</h1>
            <p>探索尖端技術和創新解決方案。</p>
            <a href="#features" class="cta-button">了解更多</a>
        </section>

        <!-- Features Section -->
        <section id="features">
            <h2>核心功能</h2>
            <div class="features-grid">
                <div class="feature-item">
                    <img src="placeholder-icon.svg" alt="功能圖標 - 創新技術" class="feature-icon">
                    <h3>創新技術</h3>
                    <p>採用最新的科技趨勢，引領行業發展。</p>
                </div>
                <div class="feature-item">
                    <img src="placeholder-icon.svg" alt="功能圖標 - 高效能" class="feature-icon">
                    <h3>高效能</h3>
                    <p>優化的解決方案，提供無與倫比的性能。</p>
                </div>
                <div class="feature-item">
                    <img src="placeholder-icon.svg" alt="功能圖標 - 用戶友好" class="feature-icon">
                    <h3>用戶友好</h3>
                    <p>直觀的設計，易於使用和理解。</p>
                </div>
            </div>
        </section>

        <!-- About Section -->
        <section id="about">
            <h2>關於我們</h2>
            <p>我們是一群熱衷於技術革新的團隊，致力於打造影響未來的產品。</p>
        </section>

        <!-- Contact Section -->
        <section id="contact">
            <h2>聯繫我們</h2>
            <p>有任何問題或合作意向？請隨時與我們聯繫。</p>
            <form action="#" id="contact-form">
                <input type="text" name="name" placeholder="您的名字" required>
                <input type="email" name="email" placeholder="您的電子郵件" required>
                <textarea name="message" placeholder="您的訊息" rows="5" required></textarea>
                <button type="submit" class="cta-button">發送訊息</button>
            </form>
        </section>
    </main>

    <!-- Footer Section -->
    <footer>
        <p>&copy; 2023 TechSite. 保留所有權利。</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
